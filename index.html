<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #ff4d6d;
            --text-color: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 40px 20px;
        }

        #typewriter {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            line-height: 1.5;
            min-height: 200px;
            margin-bottom: 30px;
            white-space: pre-wrap;
            color: var(--text-color);
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            animation: pulse 2s infinite;
        }

            .btn:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(255, 77, 109, 0.5);
            }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 77, 109, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 109, 0);
            }
        }

        .heart {
            position: fixed;
            top: -10vh;
            color: var(--primary-color);
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="typewriter"></div>
        <button class="btn" id="startBtn">Нажми меня ❤️</button>

        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const loveText = `Ты мне нравишься
Быть с тобою хочу я всегда
Хоть найдя пять минут на "привет" и "пока"
Всегда рад видеть я тебя
Будь то дождь или снег или вьюга
Всегда буду рад я увидеть тебя
Пусть недавно ты и узнала
Что неровно дышу я к тебе
Но это мне никак не помешало
Так по-ребячьи признаться тебе
В том что нравишься ты мне
Пусть я в ответе и не уверен
Но сил набравшись пишу я тебе
Что хочу быть с тобой
Как в той книге детской
Где принц обожал свою розу
А роза его
Так к чему же я веду
Не хочешь ли ты стать единственной во всём мире для меня
И чтобы я был твоим единственным во всём мире для тебя`;

        const typeWriterElement = document.getElementById('typewriter');
        const startBtn = document.getElementById('startBtn');
        const music = document.getElementById('bgMusic');
        let i = 0;

        function typeWriter() {
            typeWriterElement.style.opacity = 1;
            if (i < loveText.length) {
                typeWriterElement.innerHTML += loveText.charAt(i);
                i++;
                setTimeout(typeWriter, 55);
            }
        }

        startBtn.addEventListener('click', function () {
            music.play().catch(err => console.log("Нужен клик для звука:", err));
            startBtn.textContent = "Слушай и читай...";
            startBtn.style.animation = "none";
            startBtn.style.cursor = "default";
            startBtn.disabled = true;
            setTimeout(typeWriter, 500);
            createHearts();
        });

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = Math.random() > 0.5 ? '❤' : '💖';
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = Math.random() * 3 + 2 + "s";
                heart.style.fontSize = Math.random() * 20 + 15 + "px";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
